[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
full-at = 95

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ACAD

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 1

; see "man date" for details on how to format the time string
; NOTE: if you want to use syntax tags here you need to use %%{...}
; Default: %H:%M:%S
time-format = %H:%M:%S

format-charging = <animation-charging>
format-charging-background = ${color.background}
format-charging-foreground = ${color.foreground}
format-charging-overline = ${color.background}
format-charging-underline = ${color.background}
format-charging-padding = 1

format-discharging = <ramp-capacity>
format-discharging-background = ${color.background}
format-discharging-foreground = ${color.foreground}
format-discharging-overline = ${color.background}
format-discharging-underline = ${color.background}
format-discharging-padding = 1

format-full = <label-full>
format-full-background = ${color.background}
format-full-foreground = ${color.foreground}
format-full-overline = ${color.background}
format-full-underline = ${color.background}
format-full-padding = 1

; Available tokens:
;   %percentage% (default)
;   %time%
;   %consumption% (shows current charge rate in watts)
; label-charging = %percentage%% 
label-charging = <animation-charging>

; Available tokens:
;   %percentage% (default)
;   %time%
;   %consumption% (shows current discharge rate in watts)
label-discharging = %percentage%%
;label-discharging = %percentage%% - %time%

; Available tokens:
;   %percentage% (default)
label-full = ""

; Only applies if <ramp-capacity> is used
; ramp-capacity-0 = 
; ramp-capacity-1 = 
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-5 = 
ramp-capacity-6 = 

; Only applies if <bar-capacity> is used
;bar-capacity-width = 10

; Only applies if <animation-charging> is used
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-5 = 
animation-charging-6 = 


; Framerate in milliseconds
animation-charging-framerate = 500

; Only applies if <animation-discharging> is used
;;animation-discharging-0 = ${battery.anim0}
;;animation-discharging-1 = ${battery.anim1}

; Framerate in milliseconds
;animation-discharging-framerate = 500

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/backlight]
;type = internal/xbacklight
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = intel_backlight
; card = nvidia_0

; Available tags:
;   <label> (default)
;   <ramp>
;   <bar>
format = <ramp>
format-background = ${color.background}
format-overline = ${color.background}
format-underline = ${color.secondary}
format-padding = 1

; Available tokens:
;   %percentage% (default)
label = %percentage%%
label-foreground = ${color.foreground-alt}

; Only applies if <ramp> is used
ramp-foreground = ${color.foreground}
ramp-0 = 
ramp-0-weight = 40
ramp-1 = 
ramp-1-weight = 20
ramp-2 = 
ramp-2-weight = 20
ramp-3 = 
ramp-3-weight = 20
; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/sep]
type = custom/text
content = " "

content-background = ${color.background}
content-foreground = ${color.background}

[module/sepo]
type = custom/text
format = |

format-overline = ${color.background}
format-underline = ${color.background}

[module/cpu]
type = internal/cpu

; Seconds to sleep between updates
; Default: 1
interval = 1

; Available tags:
;   <label> (default)
;   <bar-load>
;   <ramp-load>
;   <ramp-coreload>
;;format = <label> <ramp-coreload>
format = <label>
format-prefix = 
format-prefix-foreground = ${color.primary}
format-foreground = ${color.foreground}
format-overline = ${color.background}
; format-underline = ${color.primary}
format-padding = 1

; Available tokens:
;   %percentage% (default) - total cpu load averaged over all cores
;   %percentage-sum% - Cumulative load on all cores
;   %percentage-cores% - load percentage for each core
;   %percentage-core[1-9]% - load percentage for specific core
label = "%percentage%%"
label-padding = 1

; Spacing between individual per-core ramps
;;ramp-coreload-spacing = 1
;;ramp-coreload-0 = ${cpu.load0}
;;ramp-coreload-1 = ${cpu.load1}

;;ramp-load-0 = ${cpu.load0}
;;ramp-load-1 = ${cpu.load1}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/date]
type = internal/date

; Seconds to sleep between updates
interval = 1.0

; See "http://en.cppreference.com/w/cpp/io/manip/put_time" for details on how to format the date string
; NOTE: if you want to use syntax tags here you need to use %%{...}
;;date = %Y-%m-%d%


date = "%m-%d"

; Available tags:
;   <label> (default)
format = <label>
format-background = ${color.background-alt}
format-foreground = ${color.foreground}
# format-underline= ${color.c7}
format-padding = 1

; format-prefix=" "
; format-prefix-background = ${color.background}
; format-prefix-foreground = ${color.c3}

# format-prefix-underline = ${color.c7}
; Available tokens:
;   %date%
;   %time%
; Default: %date%
label = %date%

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/time]
type = internal/date
interval = 1.0
time = "%I:%M:%S"

format = <label>
format-background = ${color.background-alt}
format-foreground = ${color.foreground}
; format-underline = ${color.secondary}
format-padding = 1

; format-prefix=" "
; format-prefix-foreground = ${color.secondary}
; format-prefix-underline = ${color.secondary}

label = %time%

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

; Normal Module
[module/network]
type = internal/network
interface = wlan0
; interface = wlp2s0

; Seconds to sleep between updates
; Default: 1
interval = 1.0

; Test connectivity every Nth update
; A value of 0 disables the feature
; NOTE: Experimental (needs more testing)
; Default: 0
;ping-interval = 3

; @deprecated: Define min width using token specifiers (%downspeed:min% and %upspeed:min%)
; Minimum output width of upload/download rate
; Default: 3
;;udspeed-minwidth = 5

; Accumulate values from all interfaces
; when querying for up/downspeed rate
; Default: false
accumulate-stats = true

; Consider an `UNKNOWN` interface state as up.
; Some devices have an unknown state, even when they're running
; Default: false
unknown-as-up = true

; Available tags:
;   <label-connected> (default)
;   <ramp-signal>
format-connected = <label-connected>
format-connected-prefix = 
format-connected-prefix-foreground = ${color.secondary}
format-connected-background = ${color.background}
format-connected-foreground = ${color.foreground}
format-connected-overline = ${color.background}
format-connected-underline = ${color.background}
format-connected-padding = 1

; Available tags:
;   <label-disconnected> (default)
format-disconnected = ""
format-disconnected-background = ${color.background}
format-disconnected-foreground = ${color.primary}
format-disconnected-overline = ${color.background}
format-disconnected-underline = ${color.background}
format-disconnected-padding = 1

; Available tags:
;   <label-connected> (default)
;   <label-packetloss>
;   <animation-packetloss>
;;format-packetloss = <animation-packetloss> <label-connected>

; Available tokens:
;   %ifname%    [wireless+wired]
;   %local_ip%  [wireless+wired]
;   %local_ip6% [wireless+wired]
;   %essid%     [wireless]
;   %signal%    [wireless]
;   %upspeed%   [wireless+wired]
;   %downspeed% [wireless+wired]
;   %linkspeed% [wired]
; Default: %ifname% %local_ip%

; label-connected = "%{A1:networkmanager_dmenu &:} %essid%%{A}"
label-connected = "%{A1:networkmanager_dmenu &:} %{A}"
label-connected-foreground = ${color.foreground-alt}

; Available tokens:
;   %ifname%    [wireless+wired]
; Default: (none)
;;label-disconnected-foreground = #66ffffff

; Available tokens:
;   %ifname%    [wireless+wired]
;   %local_ip%  [wireless+wired]
;   %local_ip6% [wireless+wired]
;   %essid%     [wireless]
;   %signal%    [wireless]
;   %upspeed%   [wireless+wired]
;   %downspeed% [wireless+wired]
;   %linkspeed% [wired]
; Default: (none)
;label-packetloss = %essid%
;label-packetloss-foreground = #eefafafa

; Only applies if <ramp-signal> is used
ramp-signal-0 = 
ramp-signal-1 = 
ramp-signal-2 = 

; Only applies if <animation-packetloss> is used
;;animation-packetloss-0 = ⚠
;;animation-packetloss-0-foreground = #ffa64c
;;animation-packetloss-1 = ⚠
;;animation-packetloss-1-foreground = #000000
; Framerate in milliseconds
;;animation-packetloss-framerate = 500

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/pulseaudio]
type = internal/pulseaudio

; Sink to be used, if it exists (find using `pacmd list-sinks`, name field)
; If not, uses default sink
# sink = alsa_output.pci-0000_03_00.6.analog-stereo
# sink = bluez_sink.C8_7B_23_53_AA_EA.a2dp_sink
# sink = alsa_output.pci-0000_00_1f.3.analog-stereo

; Use PA_VOLUME_UI_MAX (~153%) if true, or PA_VOLUME_NORM (100%) if false
; Default: true
use-ui-max = false

; Interval for volume increase/decrease (in percent points)
; Default: 5
interval = 5

; Available tags:
;   <label-volume> (default)
;   <ramp-volume>
;   <bar-volume>
ramp-volume-foreground = ${color.foreground}
format-volume = <ramp-volume>
format-volume-foreground = ${color.foreground}
format-volume-background = ${color.background}
format-volume-overline = ${color.background}
format-volume-underline = ${color.background}
format-volume-padding = 1

; Available tags:
;   <label-muted> (default)
;   <ramp-volume>
;   <bar-volume>
format-muted = 
format-muted-foreground = ${color.foreground}
format-muted-underline = ${color.background}
format-muted-overline = ${color.background}
format-muted-padding = 1

; Available tokens:
;   %percentage% (default)
label-volume =  %percentage%%
label-volume-padding = 1
label-volume-foreground = ${color.foreground-alt}

; Available tokens:
;   %percentage% (default
label-muted-foreground = ${color.background}

; Only applies if <ramp-volume> is used
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-1-weight = 50
ramp-volume-2 = 
ramp-volume-2-weight = 50

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/keyboard]
type = internal/xkeyboard

; List of indicators to ignore
blacklist-0 = num lock
blacklist-1 = scroll lock

; Available tags:
;   <label-layout> (default)
;   <label-indicator> (default)
format = <label-layout> <label-indicator>
format-prefix = 
format-background = ${color.background}
format-foreground = ${color.foreground-alt}
format-prefix-foreground = ${color.foreground}
format-overline = ${color.background}
format-underline = ${color.background}
format-padding = 1

; Available tokens:
;   %layout%
;   %name%
;   %number%
; Default: %layout%
label-layout = " %layout%"

; Available tokens:
;   %name%
; Default: %name%
label-indicator-on = %name%
label-indicator-on-foreground = ${color.primary}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/title]
type = internal/xwindow

; Available tags:
;   <label> (default)
format = <label>
format-padding = 1
format-foreground = ${color.foreground}

; Available tokens:
;   %title%
; Default: %title%
label = "%title%"
label-maxlen = 50

; Used instead of label when there is no window title
label-empty = 

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/mod]
type = internal/bspwm

format = <label-mode>
format-background = ${color.background-alt}
format-foreground = ${color.foreground}
format-padding = 1
format-underline = ${color.background}
format-overline = ${color.background}

label-monocle = "M"
label-tiled = "T"

label-floating = "F"
label-pseudotiled = "P"

label-locked = " | Locked"
label-sticky = " | Sticky"
label-private = " | Private"

; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/ewmh]
type = internal/xworkspaces

pin-workspaces = true
enable-click = false
enable-scroll = false

format-padding = 0

label-active = %name%
label-active-foreground = ${color.foreground}
label-active-background = ${color.background}

label-occupied = %name%
label-occupied-foreground = ${color.foreground-alt}
label-occupied-background = ${color.background}

label-empty = %name%
label-empty-foreground = #44474a
label-empty-background = ${color.background}


label-active-padding = 2
label-urgent-padding = 2
label-occupied-padding = 2
label-empty-padding = 2


;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/polywins]
type = custom/script
exec = ~/dotfiles/polybar/scripts/polywins/polywins.sh 2>/dev/null
label-padding = 1
tail = true

[module/hidden]
type = custom/script
label-background = ${color.foreground-alt}
label-foreground = ${color.background-alt}
exec = bspc query -N -n .hidden.window | wc -l
label-padding = 1
interval=0.1
tail=false

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/vpn]
; click-left: toggles VPN connection on/off
; click-right: opens rofi menu for VPN control
; click-middle: copies IP address to clipboard
type = custom/script
exec = "if hash mullvad &>/dev/null; then ~/.config/polybar/scripts/vpn/vpn_status mullvad; fi"
interval = 1
format = <label>

[module/mic]
type = custom/script
tail = true
label-foreground = ${color.foreground}
label-background = ${color.background}
interval = 0.1

exec = ~/.config/polybar/scripts/mic/micon
label-padding = 0
label-font = 1
